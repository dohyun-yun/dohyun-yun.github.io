<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="color-scheme" content="dark light"/>
<meta name="theme-color" content="#0b0f1a" media="(prefers-color-scheme: dark)"/>
<meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)"/>
<title>stock-strategy</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --bg: #0b0f1a;
  --bg-elev: #131a2c;
  --bg-card: #161e33;
  --border: #232c47;
  --text: #e5e7f3;
  --text-dim: #9aa3bf;
  --text-mute: #6b7493;
  --link: #7dd3fc;
  --link-hover: #bae6fd;
  --pos: #22c55e;
  --neg: #ef4444;
  --accent: #f59e0b;
  --accent-soft: rgba(245, 158, 11, 0.12);
  --shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
  --radius: 14px;
  --radius-sm: 9px;
}
[data-theme="light"] {
  --bg: #f6f7fb;
  --bg-elev: #ffffff;
  --bg-card: #ffffff;
  --border: #e3e6ef;
  --text: #1a1f2e;
  --text-dim: #5a6178;
  --text-mute: #7a8198;
  --link: #0284c7;
  --link-hover: #0369a1;
  --pos: #16a34a;
  --neg: #dc2626;
  --shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'SF Pro KR',
               'Apple SD Gothic Neo', 'Noto Sans KR', Segoe UI, Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  font-size: 16px;
  font-feature-settings: "tnum" 1, "ss01" 1;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
a { color: var(--link); text-decoration: none; }
a:hover { color: var(--link-hover); text-decoration: underline; }
code {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
  font-size: 0.88em;
  color: var(--text);
}

/* page wrap */
.page {
  max-width: 920px;
  margin: 0 auto;
  padding: 28px 22px 64px;
}
@media (max-width: 640px) { .page { padding: 18px 14px 48px; } }

/* nav */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  font-size: 14px;
}
.nav a.crumb { color: var(--text-dim); }
.nav a.crumb + a.crumb::before { content: " / "; color: var(--text-mute); margin: 0 6px; }
.nav .tools button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: 8px;
  font: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.nav .tools button:hover { color: var(--text); border-color: var(--text-dim); }

/* hero */
.hero {
  padding: 28px 28px 26px;
  border-radius: var(--radius);
  background: linear-gradient(
    135deg,
    var(--bg-card) 0%,
    var(--bg-elev) 100%
  );
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  margin-bottom: 24px;
}
.hero::before {
  content: "";
  position: absolute;
  top: -60%;
  right: -20%;
  width: 60%;
  height: 220%;
  background: radial-gradient(
    closest-side,
    var(--accent-soft),
    transparent 70%
  );
  pointer-events: none;
}
.hero .meta {
  font-size: 12px;
  color: var(--text-mute);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  align-items: center;
}
.hero .meta .alias-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 999px;
  color: var(--text);
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
  font-size: 12px;
}
.hero h1 {
  margin: 0 0 14px;
  font-size: clamp(20px, 3.4vw, 28px);
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.4;
  position: relative;
}
.hero .subline {
  color: var(--text-dim);
  font-size: 14px;
  position: relative;
}
.hero .subline strong { color: var(--text); font-weight: 600; }

.regime-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 999px;
  color: var(--accent);
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  text-transform: none;
  letter-spacing: 0;
}
.regime-badge .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

/* stats strip */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 28px;
}
.stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
}
.stat .k { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em; }
.stat .v { font-size: 22px; font-weight: 700; margin-top: 4px; color: var(--text); }
.stat .v.pos { color: var(--pos); }
.stat .v.neg { color: var(--neg); }
.stat .sub { font-size: 12px; color: var(--text-mute); margin-top: 2px; }

/* sections */
.section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 26px;
  margin-bottom: 18px;
  box-shadow: var(--shadow);
}
@media (max-width: 640px) { .section { padding: 18px 16px; } }
.section h2 {
  font-size: 17px;
  font-weight: 700;
  margin: 0 0 14px;
  letter-spacing: -0.005em;
  color: var(--text);
}
.section h2::before {
  content: "";
  display: inline-block;
  width: 3px;
  height: 14px;
  border-radius: 2px;
  background: var(--accent);
  margin-right: 10px;
  vertical-align: -2px;
}
.section h3 {
  font-size: 14px;
  font-weight: 600;
  margin: 20px 0 8px;
  color: var(--text-dim);
}
.section p { margin: 0 0 10px; color: var(--text); }
.section p:last-child { margin-bottom: 0; }
.section ul { margin: 8px 0 0; padding-left: 22px; }
.section ul li { margin-bottom: 6px; }

blockquote {
  border-left: 3px solid var(--accent);
  margin: 10px 0;
  padding: 8px 14px;
  background: var(--accent-soft);
  border-radius: 0 8px 8px 0;
  color: var(--text-dim);
}
blockquote p { margin: 0; }
hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 20px 0;
}

/* tables */
.tbl-wrap {
  overflow-x: auto;
  margin: 8px -4px;
  -webkit-overflow-scrolling: touch;
}
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 14px;
  min-width: 480px;
}
thead th {
  font-weight: 600;
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  text-align: left;
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  white-space: nowrap;
}
tbody td {
  padding: 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--bg-elev); }

/* todo list */
.todo-list {
  list-style: none;
  padding: 0;
  margin: 6px 0 0;
}
.todo-list li {
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  background: var(--bg-elev);
  transition: all 0.15s;
}
.todo-list li:hover { border-color: var(--accent); }
.todo-list label {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.55;
}
.todo-list input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 17px;
  height: 17px;
  border: 1.5px solid var(--text-mute);
  border-radius: 5px;
  margin: 2px 0 0;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.todo-list input[type="checkbox"]:checked {
  background: var(--accent);
  border-color: var(--accent);
}
.todo-list input[type="checkbox"]:checked::after {
  content: "";
  position: absolute;
  left: 4px;
  top: 1px;
  width: 5px;
  height: 9px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.todo-list input[type="checkbox"]:checked ~ span {
  color: var(--text-mute);
  text-decoration: line-through;
}

/* footer */
.foot {
  margin-top: 28px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-mute);
  text-align: center;
  line-height: 1.7;
}
.foot .disclaimer {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 12px;
  text-align: left;
  color: var(--text-dim);
}

/* alias landing / site index */
.runs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.run-card {
  display: block;
  padding: 16px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-decoration: none;
  color: inherit;
  transition: all 0.15s;
  box-shadow: var(--shadow);
}
.run-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  text-decoration: none;
}
.run-card .when { font-size: 13px; color: var(--text-mute); }
.run-card .title { font-weight: 600; margin: 6px 0 6px; font-size: 15px; color: var(--text); }
.run-card .badges { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
.run-card .badge {
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.run-card .badge.no-op { color: var(--text-mute); }
.run-card .badge.changes { color: var(--accent); border-color: var(--accent); }

.alias-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
</style>
</head>
<body>

<div class="page">
<nav class="nav"><div class="trail"><span class="crumb" style="color:var(--text)">stock-strategy</span></div><div class="tools"><button id="theme-toggle" type="button">☾ dark</button></div></nav>
<header class="hero">
  <div class="meta"><span>stock-strategy-planner</span><span>2 alias</span></div>
  <h1>전략 alias 목록</h1>
  <div class="subline">각 alias 카드는 해당 전략의 run 타임라인으로 이어집니다. 매 run 마다 새 리포트가 추가됩니다.</div>
</header>
<section class="section">
  <div class="alias-grid">
<a class="run-card" href="미국포트투자_1/index.html">
  <div class="when">2026-05-18_124850</div>
  <div class="title">미국포트투자_1</div>
  <div class="badges">
    <span class="badge" style="color:#64748b;border-color:#64748b">—</span>
    <span class="badge">cash 67%</span>
    <span class="badge">4 종목</span>
  </div>
</a>

<a class="run-card" href="한국포트_1/index.html">
  <div class="when">2026-05-17_130159</div>
  <div class="title">한국포트_1</div>
  <div class="badges">
    <span class="badge" style="color:#64748b;border-color:#64748b">—</span>
    <span class="badge">cash 100%</span>
    <span class="badge">0 종목</span>
  </div>
</a>
</div>
</section>
<footer class="foot">
  <div>stock-strategy-planner · index</div>
</footer>
</div>

<script>
(function () {
  var saved = (function () { try { return localStorage.getItem('ssp-theme'); } catch (e) { return null; } })();
  if (saved === 'light' || saved === 'dark') {
    document.documentElement.setAttribute('data-theme', saved);
  }
  function toggle() {
    var cur = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('ssp-theme', next); } catch (e) {}
    var btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = next === 'dark' ? '☾ dark' : '☀ light';
  }
  window.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.addEventListener('click', toggle);
      var cur = document.documentElement.getAttribute('data-theme') || 'dark';
      btn.textContent = cur === 'dark' ? '☾ dark' : '☀ light';
    }
    var page = document.body.getAttribute('data-page-key');
    if (page) {
      try {
        var saved = JSON.parse(localStorage.getItem('ssp-checks-' + page) || '{}');
        document.querySelectorAll('.todo-list input[type=checkbox]').forEach(function (cb, i) {
          if (saved[i]) cb.checked = true;
          cb.addEventListener('change', function () {
            try {
              var cur = JSON.parse(localStorage.getItem('ssp-checks-' + page) || '{}');
              cur[i] = cb.checked;
              localStorage.setItem('ssp-checks-' + page, JSON.stringify(cur));
            } catch (e) {}
          });
        });
      } catch (e) {}
    }
  });
})();
</script>
</body>
</html>
