<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="추천시스템·온라인광고·AI/ML/NLP 논문 리뷰 아카이브"/>
<title>arXiv Papers Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

<style>
/* ============================================================
   Papers Review — Field Notes Editorial Light
   matches dohyun-yun.github.io/assets/css/style.css (Field Notes)
   ============================================================ */
:root {
  --bg: #f7f5f0;
  --bg-card: #ffffff;
  --bg-soft: #f0ead6;
  --line: #e5e2db;
  --line-soft: #efece5;
  --ink: #1a1a1a;
  --ink-muted: #555555;
  --ink-faint: #8a8a85;

  /* alias to keep existing selectors working */
  --fg: var(--ink);
  --fg-muted: var(--ink-muted);
  --border: var(--line);

  --accent: #2c4a3e;
  --accent-hover: #1a3329;
  --accent-soft: #e8efe9;
  --chip: var(--accent-soft);
  --highlight: #f0ead6;
  --code-bg: var(--line-soft);
  --star: #b8722a;      /* warm amber instead of saturated yellow */
  --star-empty: #d6d2c5;
  --shadow-sm: 0 1px 2px rgba(26,26,26,0.04);
  --shadow: 0 4px 24px rgba(26,26,26,0.06);

  --serif: 'Newsreader','Crimson Pro','Noto Serif KR',Georgia,serif;
  --sans:  'Pretendard',-apple-system,BlinkMacSystemFont,'SF Pro KR','Apple SD Gothic Neo',Roboto,sans-serif;
  --mono:  'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
}
[data-theme="dark"] {
  --bg: #0e1410;
  --bg-card: #141a16;
  --bg-soft: #1c241e;
  --line: #2a322c;
  --line-soft: #1c241e;
  --ink: #e6e2d6;
  --ink-muted: #a8a89a;
  --ink-faint: #7a7a70;
  --accent-soft: rgba(149,193,162,0.10);
  --chip: rgba(149,193,162,0.10);
  --highlight: rgba(240,234,214,0.18);
  --code-bg: #1c241e;
  --star: #d4a560;
  --star-empty: #3a4031;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.72;
  letter-spacing: -0.005em;
  font-feature-settings: 'ss01','cv11','tnum';
  min-height: 100vh;
}
em { font-style: italic; color: var(--accent); }
strong { font-weight: 600; color: var(--ink); }

/* Korean typography — keep words intact, balance the rag */
h1, h2, h3, h4, h5, p, li, blockquote,
.hero h1, .hero .sub, main.content h2, main.content h3, main.content h4 {
  word-break: keep-all;
  text-wrap: pretty;
}

.shell {
  max-width: 920px;
  margin: 0 auto;
  padding: 32px 28px 96px;
}

/* site header — Field Notes brand row */
header.site {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding-bottom: 16px;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--line);
}
header.site .brand {
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  font-family: var(--serif);
  font-weight: 500;
  font-size: 1.05rem;
  letter-spacing: -0.01em;
}
header.site .brand a { color: var(--ink); text-decoration: none; }
header.site .brand .dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: none;
}
.theme-toggle {
  background: transparent;
  color: var(--ink-muted);
  border: 1px solid var(--line);
  border-radius: 100px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all .15s ease;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* hero — editorial article opener (no gradient panel) */
.hero {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  border-radius: 0;
  padding: 0 0 30px;
  box-shadow: none;
  margin-bottom: 36px;
}
.hero h1 {
  margin: 0 0 14px;
  font-family: var(--serif);
  font-size: clamp(1.75rem, 4vw, 2.6rem);
  font-weight: 400;
  letter-spacing: -0.022em;
  line-height: 1.18;
  color: var(--ink);
  max-width: 26ch;
}
.hero h1 em { font-style: italic; color: var(--accent); }
.hero .sub {
  color: var(--ink-muted);
  font-size: 1rem;
  margin-bottom: 22px;
  max-width: 52ch;
  line-height: 1.65;
}
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 0;
  margin-top: 14px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.stat {
  background: transparent;
  border: none;
  border-right: 1px solid var(--line);
  border-radius: 0;
  padding: 14px 16px;
}
.stat:last-child { border-right: none; }
.stat .k {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.stat .v {
  font-family: var(--serif);
  font-size: 1.35rem;
  font-weight: 500;
  letter-spacing: -0.015em;
  color: var(--ink);
  line-height: 1.05;
}

/* article body */
main.content { color: var(--ink); }
main.content h2 {
  font-family: var(--serif);
  font-size: 1.55rem;
  font-weight: 500;
  margin: 48px 0 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
  letter-spacing: -0.012em;
  line-height: 1.25;
}
main.content h2 em { font-style: italic; color: var(--accent); }
main.content h3 {
  font-family: var(--sans);
  font-size: 1.1rem;
  font-weight: 600;
  margin: 32px 0 10px;
  letter-spacing: -0.005em;
  color: var(--ink);
}
main.content h4 {
  font-family: var(--mono);
  font-size: 0.78rem;
  margin: 24px 0 8px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
main.content h5 {
  font-family: var(--mono);
  font-size: 0.72rem;
  margin: 20px 0 8px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.14em;
}
main.content p { margin: 10px 0; line-height: 1.72; }
main.content a {
  color: var(--ink);
  text-decoration: none;
  border-bottom: 1px solid var(--line);
  transition: all .2s ease;
}
main.content a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
main.content code {
  background: var(--line-soft);
  color: var(--ink);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 0.88em;
}
main.content pre {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius, 8px);
  padding: 18px 20px;
  overflow-x: auto;
  box-shadow: var(--shadow-sm);
}
main.content pre code {
  background: transparent;
  padding: 0;
  color: var(--ink);
}
main.content blockquote {
  border-left: 2px solid var(--accent);
  padding: 4px 0 4px 20px;
  margin: 18px 0;
  color: var(--ink-muted);
  background: transparent;
  border-radius: 0;
  font-family: var(--serif);
  font-size: 1.05rem;
  font-style: italic;
  line-height: 1.55;
}
main.content blockquote p { margin: 4px 0; }
main.content hr {
  border: 0;
  text-align: center;
  margin: 36px auto;
}
main.content hr::before {
  content: "◆ ◆ ◆";
  color: var(--ink-faint);
  font-size: 0.55rem;
  letter-spacing: 0.85rem;
  margin-left: 0.85rem;
}
main.content ul, main.content ol { margin: 10px 0; padding-left: 1.5em; }
main.content li { margin: 6px 0; line-height: 1.65; }
main.content strong {
  font-weight: 600;
  background: linear-gradient(transparent 65%, var(--highlight) 65%);
  padding: 0 0.1em;
}
main.content ul.checklist { list-style: none; padding-left: 0; }
main.content ul.checklist li { display: flex; align-items: baseline; gap: 10px; }

main.content .table-wrap {
  overflow-x: auto;
  margin: 18px 0;
  border-radius: 0;
  border: none;
}
main.content table {
  width: 100%;
  border-collapse: collapse;
  background: transparent;
  font-size: 0.92rem;
}
main.content thead { background: transparent; }
main.content thead th {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  font-weight: 500;
  text-align: left;
  padding: 12px 14px;
  border-bottom: 1px solid var(--ink);
}
main.content td {
  padding: 13px 14px;
  text-align: left;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
  color: var(--ink);
  line-height: 1.6;
}
main.content tbody tr:last-child td { border-bottom: 0; }
main.content tbody tr:hover { background: var(--line-soft); }

.stars { color: var(--star); letter-spacing: 0.5px; white-space: nowrap; }
.stars-empty { color: var(--star-empty); }

/* math block — light surface */
.math-block {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px 22px;
  margin: 18px 0;
  overflow-x: auto;
  box-shadow: var(--shadow-sm);
}
.math-block .katex-display { margin: 0; }
.katex { color: var(--ink); }

.paper-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 26px 28px;
  margin: 22px 0;
  box-shadow: var(--shadow-sm);
}

footer.site {
  margin-top: 64px;
  padding-top: 22px;
  border-top: 1px solid var(--line);
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
footer.site a { color: var(--ink-muted); text-decoration: none; border-bottom: 1px solid var(--line); }
footer.site a:hover { color: var(--accent); border-bottom-color: var(--accent); }

@media (max-width: 640px) {
  .shell { padding: 20px 16px 80px; }
  .hero { padding: 0 0 24px; }
  .hero h1 { font-size: 1.55rem; }
  main.content h2 { font-size: 1.3rem; margin-top: 36px; }
  main.content th, main.content td { font-size: 0.85rem; padding: 10px 10px; }
  .stats { grid-template-columns: 1fr 1fr; }
  .stat:nth-child(2n) { border-right: none; }
  .stat { border-bottom: 1px solid var(--line); }
  .stat:nth-last-child(-n+2) { border-bottom: none; }
}

/* category / archive listing — editorial list cards */
.cat-list {
  display: grid;
  gap: 0;
  grid-template-columns: 1fr;
  margin-top: 18px;
  border-top: 1px solid var(--line);
}
.cat-list a {
  display: grid;
  grid-template-columns: 130px 1fr auto;
  gap: 1.5rem;
  align-items: baseline;
  padding: 22px 4px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  border-radius: 0;
  color: var(--ink);
  text-decoration: none;
  transition: background .2s ease;
}
.cat-list a:hover {
  background: linear-gradient(to right, transparent, var(--line-soft), transparent);
  border-color: var(--line);
  transform: none;
}
.cat-list .date {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  font-weight: 500;
  color: var(--ink-faint);
}
.cat-list .meta {
  font-family: var(--serif);
  color: var(--ink);
  font-size: 1.1rem;
  letter-spacing: -0.01em;
  margin-top: 0;
  line-height: 1.35;
  transition: color .2s ease;
}
.cat-list a:hover .meta { color: var(--accent); }
.cat-list a::after {
  content: "→";
  font-family: var(--serif);
  font-size: 1.2rem;
  color: var(--ink-faint);
  transition: transform .2s ease, color .2s ease;
}
.cat-list a:hover::after { color: var(--accent); transform: translateX(4px); }
@media (max-width: 640px) {
  .cat-list a { grid-template-columns: 1fr; gap: 0.45rem; }
  .cat-list a::after { display: none; }
}
</style>
</head>
<body>
<div class="shell">
<header class="site">
  <div class="brand"><span class="dot"></span><a href="../">arXiv Papers Review</a></div>
  <button class="theme-toggle" id="theme-toggle" aria-label="theme toggle">☾ Dark</button>
</header>
<section class="hero">
  <h1>arXiv Papers Review</h1>
  <div class="sub">추천시스템 · 온라인광고 · AI/ML/NLP 논문 자동 리뷰 아카이브</div>
</section>

<main class="content">
<h2>리뷰 목록</h2>
<div class="cat-list">
<a href="./2026-05-18/"><div class="date">2026-05-18</div><div class="meta">433편</div></a>
<a href="./2026-05-17/"><div class="date">2026-05-17</div><div class="meta">2026-05-10 ~ 2026-05-17 (7일) · 7편</div><div class="meta">카테고리 · cs.IR, cs.LG, cs.CY, cs.AI, cs.SI, stat.ML, cs.CL, cs.DB, cs.DC</div></a>
</div>
</main>
<footer class="site">
  <div>arXiv 논문 리뷰 · Claude Code 자동 생성</div>
  <div><a href="../">전체 목록</a></div>
</footer>
</div>

<script>
(function () {
  var root = document.documentElement;
  var saved = null;
  try { saved = localStorage.getItem("papers-review-theme"); } catch (e) {}
  if (!saved) {
    saved = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches)
      ? "dark" : "light";
  }
  root.setAttribute("data-theme", saved);
  document.addEventListener("DOMContentLoaded", function () {
    var btn = document.getElementById("theme-toggle");
    if (!btn) return;
    var sync = function () {
      var t = root.getAttribute("data-theme") || "light";
      btn.textContent = t === "dark" ? "☀ Light" : "☾ Dark";
    };
    sync();
    btn.addEventListener("click", function () {
      var t = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", t);
      try { localStorage.setItem("papers-review-theme", t); } catch (e) {}
      sync();
    });
  });
})();
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {
  if (typeof renderMathInElement === "undefined") return;
  renderMathInElement(document.body, {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "$",  right: "$",  display: false}
    ],
    throwOnError: false,
    macros: { "\\RR": "\\mathbb{R}" }
  });
});
</script>

</body>
</html>
