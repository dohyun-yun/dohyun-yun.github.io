<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="추천시스템·온라인광고·AI/ML/NLP 논문 리뷰 아카이브"/>
<title>arXiv Papers Review</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

<style>
:root {
  --bg: #0b1020;
  --bg-card: #121933;
  --bg-soft: #18204a;
  --fg: #e6e9f5;
  --fg-muted: #98a0c4;
  --accent: #7c9cff;
  --accent-soft: #1e2a5a;
  --border: #243067;
  --chip: #1e2a5a;
  --code-bg: #0c1230;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --star: #ffd866;
  --star-empty: #3a4377;
}
[data-theme="light"] {
  --bg: #f7f8fb;
  --bg-card: #ffffff;
  --bg-soft: #eef1fb;
  --fg: #14193a;
  --fg-muted: #5b6589;
  --accent: #3858d8;
  --accent-soft: #e0e7ff;
  --border: #d8def0;
  --chip: #e0e7ff;
  --code-bg: #eef1fb;
  --shadow: 0 4px 18px rgba(20,25,58,0.06);
  --star: #f0a020;
  --star-empty: #c8cee0;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: 'Pretendard', 'Inter', 'IBM Plex Sans KR', system-ui,
               -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
body { min-height: 100vh; }
.shell {
  max-width: 920px;
  margin: 0 auto;
  padding: 28px 22px 96px;
}
header.site {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding-bottom: 18px;
  margin-bottom: 22px;
  border-bottom: 1px solid var(--border);
}
header.site .brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  letter-spacing: -0.01em;
  font-size: 1.05rem;
}
header.site .brand a {
  color: var(--fg);
  text-decoration: none;
}
header.site .brand .dot {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 999px;
  box-shadow: 0 0 0 4px var(--accent-soft);
}
.theme-toggle {
  background: var(--bg-card);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all .15s ease;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

.hero {
  background: linear-gradient(135deg, var(--bg-card), var(--bg-soft));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 28px;
  box-shadow: var(--shadow);
  margin-bottom: 22px;
}
.hero h1 {
  margin: 0 0 8px;
  font-size: 1.7rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.25;
}
.hero .sub {
  color: var(--fg-muted);
  font-size: 0.95rem;
  margin-bottom: 14px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-top: 6px;
}
.stat {
  background: rgba(124,156,255,0.07);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
}
.stat .k {
  font-size: 0.78rem;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.stat .v {
  font-size: 1.1rem;
  font-weight: 700;
  margin-top: 4px;
}

main.content { color: var(--fg); }
main.content h2 {
  font-size: 1.35rem;
  margin: 36px 0 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  letter-spacing: -0.01em;
}
main.content h3 {
  font-size: 1.12rem;
  margin: 28px 0 10px;
  letter-spacing: -0.01em;
}
main.content h3:has(+ p strong:first-child) { color: var(--accent); }
main.content h4 {
  font-size: 1rem;
  margin: 22px 0 8px;
  color: var(--accent);
  font-weight: 700;
}
main.content h5 {
  font-size: 0.95rem;
  margin: 18px 0 8px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
main.content p { margin: 8px 0; }
main.content a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px dashed transparent;
  transition: border-color .15s ease;
}
main.content a:hover { border-bottom-color: var(--accent); }
main.content code {
  background: var(--code-bg);
  color: var(--accent);
  padding: 0.1em 0.4em;
  border-radius: 4px;
  font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  font-size: 0.88em;
}
main.content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  overflow-x: auto;
}
main.content pre code {
  background: transparent;
  padding: 0;
  color: var(--fg);
}
main.content blockquote {
  border-left: 3px solid var(--accent);
  padding: 6px 16px;
  margin: 14px 0;
  color: var(--fg-muted);
  background: var(--bg-card);
  border-radius: 0 8px 8px 0;
}
main.content blockquote p { margin: 4px 0; }
main.content hr {
  border: 0;
  border-top: 1px solid var(--border);
  margin: 28px 0;
}
main.content ul, main.content ol { margin: 8px 0; padding-left: 1.5em; }
main.content li { margin: 4px 0; }
main.content ul.checklist {
  list-style: none;
  padding-left: 0;
}
main.content ul.checklist li {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
main.content .table-wrap {
  overflow-x: auto;
  margin: 14px 0;
  border-radius: 12px;
  border: 1px solid var(--border);
}
main.content table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-card);
}
main.content thead {
  background: var(--bg-soft);
}
main.content th, main.content td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  font-size: 0.92rem;
}
main.content tbody tr:last-child td { border-bottom: 0; }
main.content tbody tr:hover { background: rgba(124,156,255,0.04); }

.stars { color: var(--star); letter-spacing: 0.5px; white-space: nowrap; }
.stars-empty { color: var(--star-empty); }

.math-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  margin: 14px 0;
  overflow-x: auto;
}

.paper-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px 24px;
  margin: 18px 0;
  box-shadow: var(--shadow);
}

footer.site {
  margin-top: 56px;
  padding-top: 22px;
  border-top: 1px solid var(--border);
  color: var(--fg-muted);
  font-size: 0.85rem;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
footer.site a { color: var(--fg-muted); text-decoration: underline; }

@media (max-width: 640px) {
  .shell { padding: 18px 14px 80px; }
  .hero { padding: 22px 18px; border-radius: 16px; }
  .hero h1 { font-size: 1.4rem; }
  main.content h2 { font-size: 1.15rem; }
  main.content th, main.content td { font-size: 0.85rem; padding: 8px 9px; }
}
.cat-list {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  margin-top: 18px;
}
.cat-list a {
  display: block;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  color: var(--fg);
  text-decoration: none;
  transition: transform .15s ease, border-color .15s ease;
}
.cat-list a:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
}
.cat-list .date {
  font-weight: 700;
  letter-spacing: -0.01em;
}
.cat-list .meta {
  color: var(--fg-muted);
  font-size: 0.85rem;
  margin-top: 4px;
}
</style>
</head>
<body>
<div class="shell">
<header class="site">
  <div class="brand"><span class="dot"></span><a href="../">arXiv Papers Review</a></div>
  <button class="theme-toggle" id="theme-toggle" aria-label="theme toggle">☀ Light</button>
</header>
<section class="hero">
  <h1>arXiv Papers Review</h1>
  <div class="sub">추천시스템 · 온라인광고 · AI/ML/NLP 논문 자동 리뷰 아카이브</div>
</section>

<main class="content">
<h2>리뷰 목록</h2>
<div class="cat-list">
<a href="./2026-05-17/"><div class="date">2026-05-17</div><div class="meta">2026-05-10 ~ 2026-05-17 (7일) · 7편</div><div class="meta">카테고리 · cs.IR, cs.LG, cs.CY, cs.AI, cs.SI, stat.ML, cs.CL, cs.DB, cs.DC</div></a>
</div>
</main>
<footer class="site">
  <div>arXiv 논문 리뷰 · Claude Code 자동 생성</div>
  <div><a href="../">전체 목록</a></div>
</footer>
</div>

<script>
(function () {
  var root = document.documentElement;
  var saved = null;
  try { saved = localStorage.getItem("papers-review-theme"); } catch (e) {}
  if (!saved) {
    saved = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches)
      ? "light" : "dark";
  }
  root.setAttribute("data-theme", saved);
  document.addEventListener("DOMContentLoaded", function () {
    var btn = document.getElementById("theme-toggle");
    if (!btn) return;
    var sync = function () {
      var t = root.getAttribute("data-theme") || "dark";
      btn.textContent = t === "dark" ? "☀ Light" : "☾ Dark";
    };
    sync();
    btn.addEventListener("click", function () {
      var t = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", t);
      try { localStorage.setItem("papers-review-theme", t); } catch (e) {}
      sync();
    });
  });
})();
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {
  if (typeof renderMathInElement === "undefined") return;
  renderMathInElement(document.body, {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "$",  right: "$",  display: false}
    ],
    throwOnError: false,
    macros: { "\\RR": "\\mathbb{R}" }
  });
});
</script>

</body>
</html>
